<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IZITAFF</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  transition: 0.3s;
}
@media (max-height: 750px) {
  .mode-buttons {
    transform: translateY(-100%);
    transition: transform 0.3s ease;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }
  .mode-buttons.show {
    transform: translateY(0);
  }
}
#modeHoverArea {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 25px;
  z-index: 5;
}
.container {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  bottom: 20px;
  background: white;
  padding: 10px 15px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}
.scroll-zone {
  flex: 1;
  overflow-y: auto;
  padding-right: 4px;
}
.mode-buttons, .template-buttons, .bottom-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex-shrink: 0;
}
button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  white-space: pre-wrap;
}
.mode { background: #666; color: white; font-size: 16px; }
.template { background: #333; color: white; font-size: 16px; }
.active { background: #007bff !important; }
label {
  font-weight: bold;
  margin-top: 8px;
  display: block;
}
textarea, input, select {
  width: 100%;
  padding: 8px;
  font-size: 17px;
  line-height: 1.3em;
  border-radius: 6px;
  border: 1px solid #ccc;
  resize: none;
}
body:not(.dark) textarea:focus,
body:not(.dark) input:focus,
body:not(.dark) select:focus {
  outline: none !important;
  box-shadow: inset 0 0 0 1px #000000;
  border-color: transparent !important;
}
body.dark textarea:focus,
body.dark input:focus,
body.dark select:focus {
  outline: none !important;
  box-shadow: inset 0 0 0 1px #ffffff;
  border-color: transparent !important;
}
#anomalie { 
  height: 42px; 
  resize: none; 
}
#illico { 
  height: 42px; 
  resize: none; 
}
#fait { 
  height: 50px; 
  resize: none; 
}
#capella { 
  height: 42px; 
  resize: none; 
}
#cpa { 
  height: 42px; 
  resize: none; 
}
#expert { 
  height: 50px; 
  resize: none; 
}
.checkbox-line {
  margin-top: 6px;
}
.checkbox-line label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: bold;
  cursor: pointer;
}
#quickModeBlock {
  display: none;
  flex-direction: row;
  gap: 10px;
}
#quickModeBlock button {
  width: 100%;
  padding: clamp(12px, 3vh, 24px);
  font-size: clamp(16px, 2.2vh, 22px);
  font-weight: 700;
  border-radius: 12px;
  min-height: clamp(60px, 12vh, 110px);
}
#counterGroup {
  flex: 2;
  display: flex;
  gap: 6px;
}
.counterBtn {
  flex: 1;
  background: #999;
  color: white;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px;
  font-weight: bold;
  font-size: 15px;
  position: relative;
}
.counterBtn.green {
  box-shadow: 0 0 6px rgba(0, 255, 100, 0.6);
}
.counterBtn.yellow {
  box-shadow: 0 0 6px rgba(255, 210, 0, 0.7);
}
.counterBtn span {
  flex: 1;
  text-align: center;
}
.counterAction {
  flex: 0 0 28px;
  padding: 6px 0;
  background: transparent;
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
}
body.dark .counterBtn {
  background: #555;
}
.bottom-buttons button {
  font-size: 15px;
}
.dark-top {
  flex: 0 0 38px;
  height: 38px;
  padding: 0;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ddd;
}
.counterBtn.holding {
  opacity: 0.6;
  transition: 0.2s;
}
body.dark .dark-top {
  background: #444;
  color: white;
}
#copyBtn { background: black; color: white; }
#resetBtn { background: #999; color: white; }
#darkModeToggle { width: 50px; background: #ddd; }
body.dark { background: #121212; color: #e0e0e0; }
body.dark .container { background: #1e1e1e; }
body.dark textarea, body.dark input, body.dark select {
  background: #2a2a2a; color: white; border: 1px solid #444;
}
body.dark .mode { background: #444; }
body.dark .template { background: #555; }
body.dark .active { background: #0056b3 !important; }
body.dark #copyBtn { background: #0a84ff; }
body.dark #resetBtn { background: #555; }
body.dark #darkModeToggle { background: #444; color: white; }
.signature {
  position: fixed;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: #888;
  opacity: 0.6;
  pointer-events: none;
}
body.dark .signature { color: #666; }
@keyframes blinkOnce {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}
.blink { animation: blinkOnce 0.18s ease-in-out; }
</style>
</head>
<body>
<div id="modeHoverArea"></div>
<div class="container">
  <div class="mode-buttons">
  <button class="mode active" id="modeSolde" onclick="setMode('SOLDE')">MODE SOLDE</button>
  <button class="mode" id="modePre" onclick="setMode('PRE')">MODE PRE</button>
  <button class="mode" id="modeQuick" onclick="setMode('QUICK')">M002</button>
  <button id="darkModeToggle" class="dark-top" onclick="toggleDarkMode()">🌙</button>
</div>
  <div class="template-buttons">
    <button class="template" onclick="copyTemplate('F120')">F120</button>
    <button class="template" onclick="copyTemplate('F130')">F130</button>
    <button class="template" onclick="copyTemplate('F140')">F140</button>
    <button class="template" onclick="copyTemplate('F180')">F180</button>
    <button class="template" onclick="copyTemplate('D06')">D06</button>
  </div>
  <div class="scroll-zone">
    <div id="normalBlocks">
      <label>Date souhaitée fournisseur :</label>
      <input id="date">
      <label id="anomalieLabel">Anomalie Bloquante :</label>
      <div style="display:flex; gap:4px; align-items:center;">
        <button class="addPresetBtn" onclick="addAnomaliePreset()">➕</button>
        <input type="text" id="newAnomalie" placeholder="Ajouter">
      </div>
      <select id="anomalieSelect" onchange="applyAnomaliePreset()">
        <option value="">-- Choisir --</option>
      </select>
      <textarea id="anomalie"></textarea>
      <label>Illico :</label>
      <select id="illicoSelect" onchange="applyIllicoPreset(this.value)">
        <option value="">-- Choisir --</option>
        <option value="À jour + Ping OK">À jour + Ping OK</option>
        <option value="Réconcilié + Ping OK">Réconcilié + Ping OK</option>
        <option value="+ Ping KO">+ Ping KO</option>
        <option value="Historique">Historique</option>
      </select>
      <textarea id="illico" placeholder="-- Illico --"></textarea>
      <label>Ce que j'ai fait :</label>
      <div style="display:flex; gap:4px; align-items:center;">
        <button class="addPresetBtn" onclick="addFaitPreset()">➕</button>
        <input type="text" id="newFait" placeholder="Ajouter">
      </div>
      <select id="presetSelect" onchange="applyPreset()">
        <option value="">-- Choisir --</option>
      </select>
      <textarea id="fait"></textarea>
      <div class="checkbox-line">
        <label><input type="checkbox" id="capellaCheck" onchange="toggleField('capellaBlock', this)"> Capella</label>
      </div>
      <div id="capellaBlock" class="optional-block"><textarea id="capella"></textarea></div>
      <div class="checkbox-line">
  <label><input type="checkbox" id="cpaCheck"> CPA</label>
</div>
      <div class="checkbox-line">
        <label><input type="checkbox" id="expertCheck" onchange="toggleField('expertBlock', this)"> Expert</label>
      </div>
      <div id="expertBlock" class="optional-block"><textarea id="expert"></textarea></div>
    </div>
    <div id="quickModeBlock" class="optional-block">
      <button onclick="copierTexteRapide(this)">M002  ADRESSE RECEVABLE</button>
      <button onclick="copierTexteRapide(this)">Demande :

Traitement: Bonjour, le changement d'adresse a bien été effectué. Merci pour votre confiance. Cordialement.</button>
      <button onclick="copierTexteRapide(this)">Bonjour, le changement d'adresse a bien été effectué. Merci pour votre confiance. Cordialement.</button>
    </div>
  </div>
<div class="bottom-buttons">
  <button id="copyBtn" onclick="copierTexte()">Copier tout</button>
  <button id="resetBtn" onclick="resetAll()">Reset</button>
  <div id="counterGroup">
  <div class="counterBtn green"
       onmousedown="startHoldReset(1)"
       onmouseup="cancelHoldReset()"
       onmouseleave="cancelHoldReset()"
       ontouchstart="startHoldReset(1)"
       ontouchend="cancelHoldReset()">
    <button class="counterAction" onclick="decrementCounter1(event)">−</button>
    <span id="counterValue1">0</span>
    <button class="counterAction" onclick="incrementCounter1(event)">+</button>
  </div>
  <div class="counterBtn yellow"
       onmousedown="startHoldReset(2)"
       onmouseup="cancelHoldReset()"
       onmouseleave="cancelHoldReset()"
       ontouchstart="startHoldReset(2)"
       ontouchend="cancelHoldReset()">
    <button class="counterAction" onclick="decrementCounter2(event)">−</button>
    <span id="counterValue2">0</span>
    <button class="counterAction" onclick="incrementCounter2(event)">+</button>
  </div>
</div>
<div class="signature">© 2026 - Créé par IdrenSound</div>
<script>
const modeButtons = document.querySelector('.mode-buttons');
const hoverArea = document.getElementById('modeHoverArea');
hoverArea.addEventListener('mouseenter', () => {
  modeButtons.classList.add('show');
});
hoverArea.addEventListener('mouseleave', () => {
  modeButtons.classList.remove('show');
});
let currentMode = "SOLDE";
const presets = {
  SOLDE: ["Analyse + Solde via assistant CRI () -> Terminé + PDL à jour","Analyse + Solde via assistant CRI (PRG sur CCB, libellé matériel corrigé) -> Terminé + PDL à jour","Analyse + Solde via assistant CRI (Modification des services souscrits: ) -> Terminé + PDL à jour -> M013  -> Suprression des frais facturés à torts"],
  PRE: ["Analyse + 1er appel KO + MV -> Relance","Analyse + 1er appel OK + RDV + SMS"]
};
const anomaliePresets = {
  SOLDE: [
    "les informations transmises ne permettent pas d'identifier un matériel de catégorie CCB",
    "il est impossible de rebrancher un branchement qui n'est pas hors service",
    "le réglage de la protection est incohérent avec la puissance souscrite du contrat de référence",
    "différence entre puissance réglée de référence et puissance souscrite",
],
  PRE: [
    "ECH004 : Ordre non reçu par le compteur x",
    "ECH003 : Ordre non délivré par NOC au K x",
    "REJ427 : Compteur non communicant x",
    "REJ012 : Commande A_Date (ou A_date_express) en cours sur le même PDS et sur au moins un même objet programmable pour une date postérieure ou égale à la date d'exécution souhaitée"
  ]
};
function setMode(mode){
  currentMode = mode;
  document.querySelectorAll(".mode").forEach(btn => btn.classList.remove("active"));
  if(mode==="SOLDE") document.getElementById("modeSolde").classList.add("active");
  else if(mode==="PRE") document.getElementById("modePre").classList.add("active");
  else if(mode==="QUICK") document.getElementById("modeQuick").classList.add("active");
  const normal = document.getElementById("normalBlocks");
  const quick = document.getElementById("quickModeBlock");
  if(mode === "QUICK"){
    normal.style.display = "none";
    quick.style.display = "flex";
    document.getElementById("copyBtn").style.display = "none";
    document.getElementById("resetBtn").style.display = "none";
} 
else {
    normal.style.display = "block";
    quick.style.display = "none";
    document.getElementById("copyBtn").style.display = "block";
    document.getElementById("resetBtn").style.display = "block";
}
  document.querySelectorAll("#capellaBlock, #expertBlock")
    .forEach(b => b.style.display = "none");
  document.querySelectorAll("#capellaCheck, #cpaCheck, #expertCheck")
    .forEach(c => c.checked = false);
  if(mode !== "QUICK"){
    const select = document.getElementById("presetSelect");
    select.innerHTML = '<option value="">-- Choisir --</option>';
    presets[mode].forEach(val => {
      const o = document.createElement("option");
      o.value = o.text = val;
      select.appendChild(o);
    });
    updateAnomalieMenu();
    document.getElementById("anomalieLabel").innerText =
      (mode==="SOLDE") ? "Anomalie Bloquante :" : "Echecs :";
    document.getElementById("fait").value = presets[mode][0];
  }
}
function copyTemplate(t){navigator.clipboard.writeText((document.getElementById("expertCheck").checked?t+" - TRANSFERT EXPERT":t+" - SOLDÉ")); showCopyAlert();}
function toggleField(id,c){
  const block = document.getElementById(id);
  block.style.display = c.checked ? "block" : "none";

  if(id === "expertBlock" && c.checked){
    const expertField = document.getElementById("expert");
    if(expertField.value.trim() === ""){
      expertField.value = "FMS - TRANSFERT EXPERT - KO\nBonjour, je vous prie de bien vouloir prendre en charge ce dossier car ";
    }
  }
}function applyPreset(){const v=document.getElementById("presetSelect").value; if(v) document.getElementById("fait").value=v;}
function applyAnomaliePreset(){const v=document.getElementById("anomalieSelect").value; if(v) document.getElementById("anomalie").value=v;}
function applyIllicoPreset(v){if(v)document.getElementById("illico").value=v;}
function addFaitPreset(){const t=document.getElementById("newFait").value.trim(); if(!t)return; presets[currentMode].push(t); setMode(currentMode); document.getElementById("newFait").value="";}
function addAnomaliePreset(){const t=document.getElementById("newAnomalie").value.trim(); if(!t)return; anomaliePresets[currentMode].push(t); updateAnomalieMenu(); document.getElementById("newAnomalie").value="";}
function updateAnomalieMenu(){const s=document.getElementById("anomalieSelect"); s.innerHTML='<option value="">-- Choisir --</option>'; anomaliePresets[currentMode].forEach(v=>{const o=document.createElement("option"); o.value=o.text=v; s.appendChild(o);});}
function copierTexte(){let s=[]; s.push("Date souhaitée fournisseur : "+document.getElementById("date").value); s.push(document.getElementById("anomalieLabel").innerText+" "+document.getElementById("anomalie").value); s.push("Illico : "+document.getElementById("illico").value); s.push("Ce que j'ai fait : "+document.getElementById("fait").value); if(document.getElementById("capellaCheck").checked)s.push("Capella : "+document.getElementById("capella").value); if(document.getElementById("cpaCheck").checked)s.push("CPA : Oui"); if(document.getElementById("expertCheck").checked)s.push("Transfert Expert : "+document.getElementById("expert").value); navigator.clipboard.writeText(s.join("\n")); showCopyAlert();}
function copierTexteRapide(b){navigator.clipboard.writeText(b.innerText).then(()=>showCopyAlert());}
function showCopyAlert(){let m=document.createElement("div"); m.innerText="Texte copié !"; m.style.position="fixed"; m.style.bottom="20px"; m.style.left="50%"; m.style.transform="translateX(-50%)"; m.style.background="black"; m.style.color="white"; m.style.padding="8px 16px"; m.style.borderRadius="6px"; m.style.zIndex="999"; document.body.appendChild(m); setTimeout(()=>m.remove(),1500);}
function resetAll(){
  document.querySelectorAll("input[type=text],textarea").forEach(e=>e.value="");
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
  document.querySelectorAll(".optional-block").forEach(b=>b.style.display="none");
  document.getElementById("illicoSelect").selectedIndex = 0;
  document.getElementById("illico").value = "";
  setMode("SOLDE");
}
function toggleDarkMode(){document.body.classList.toggle("dark"); const b=document.getElementById("darkModeToggle"); if(document.body.classList.contains("dark")){b.innerText="☀️"; localStorage.setItem("darkMode","on");} else{b.innerText="🌙"; localStorage.setItem("darkMode","off");}}
let counter1 = parseInt(localStorage.getItem("counterValue1")) || 0;
function updateCounter1() {
  document.getElementById("counterValue1").innerText = counter1;
  localStorage.setItem("counterValue1", counter1);
}
function incrementCounter1(e) {
   e.stopPropagation();
  counter1++;
  updateCounter1();
}
function decrementCounter1(e) {
     e.stopPropagation();
  if (counter1 > 0) counter1--;
  updateCounter1();
}
let counter2 = parseInt(localStorage.getItem("counterValue2")) || 0;
function updateCounter2() {
  document.getElementById("counterValue2").innerText = counter2;
  localStorage.setItem("counterValue2", counter2);
}
function incrementCounter2(e) {
   e.stopPropagation();
  counter2++;
  updateCounter2();
}
function decrementCounter2(e) {
   e.stopPropagation();
  if (counter2 > 0) counter2--;
  updateCounter2();
}
let holdTimer = null;
let holdTarget = null;
function startHoldReset(counterNumber) {
  holdTarget = counterNumber;
  const element = document.querySelectorAll(".counterBtn")[counterNumber - 1];
  element.classList.add("holding");
  holdTimer = setTimeout(() => {
    if (counterNumber === 1) {
      counter1 = 0;
      updateCounter1();
    } else {
      counter2 = 0;
      updateCounter2();
    }
  }, 1200); // 1.2 secondes
}
function cancelHoldReset() {
  clearTimeout(holdTimer);
  document.querySelectorAll(".counterBtn").forEach(el => el.classList.remove("holding"));
}
window.onload=function(){
  if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    document.getElementById("darkModeToggle").innerText="☀️";
  }
  updateCounter1();
  updateCounter2();
}; setMode("SOLDE");
document.addEventListener("click", function(e) {
  if (e.target.matches(".addPresetBtn, #quickModeBlock button, .template, #copyBtn, #resetBtn")) {
    e.target.classList.add("blink");
    e.target.addEventListener("animationend", function() {
      e.target.classList.remove("blink");
    }, { once: true });
  }
});
</script>
</body>
</html>
